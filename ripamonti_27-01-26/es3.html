<script>
    //da sistemare
    function positivo(n) {
        return new Promise((resolve, reject) => {
            setTimeout(() => {
                if (n >= 0) resolve(true);
                else reject(false);
            }, 2000);
        })
    }

    positivo().then((esito) => console.log(esito)).catch((esito) => console.log(esito))
