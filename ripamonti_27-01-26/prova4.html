<script>
    function operazioneConErrore() {
        return new Promise((resolve, reject) => {
            setTimeout(() => {
                reject("Si è verificato un errore");
            }, 1500);
        });
    }

    operazioneConErrore().then((risultato) => console.log(risultato)).catch((errore) => console.log("Errore:", errore))
</script>
