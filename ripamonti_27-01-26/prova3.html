<script>
    function verificaOperazioni(successo) {
        return new Promise((resolve, reject) => {
            setTimeout(() => {
                if (successo) {
                    resolve("Operazione riuscita");
                } else {
                    reject("Operazione fallita");
                }
            }, 2000);
        });
    }

    verificaOperazioni(true).then((risultato) => console.log(risultato)).catch((errore) => console.log(errore));
</script>
