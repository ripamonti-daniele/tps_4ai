<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gioco del 15</title>
    <link rel="stylesheet" href="stili.css">
</head>
<body>
    <header class="top-title">
        <h1>
            <span id="link-15" class="game-link active">Gioco del 15</span>
            <span class="sep">|</span>
            <span id="link-2048" class="game-link">2048</span>
        </h1>
    </header>

    <div class="wrapper">
        <!-- CLASSIFICA A SINISTRA -->
        <div id="classifica">
            <h3>🏆 Top 10</h3>
            <ul id="lista-classifica"></ul>
        </div>

        <!-- GRIGLIA DI GIOCO AL CENTRO -->
        <div class="game-area">
            <div id="game-board"></div>

            <aside class="controls">
                <div id="moves">Mosse: 0</div>
                <button id="reset-btn">Gioca ancora</button>
            </aside>
        </div>

        <!-- PLACEHOLDER DESTRA per simmetria -->
        <div class="side-spacer"></div>
    </div>

    <!-- POPUP VITTORIA / GAME OVER -->
    <div id="victory-popup" class="popup">
        <div class="popup-content">
            <h2 id="popup-title">Hai completato il gioco!</h2>
            <p id="victory-message"></p>
            <input type="text" id="name-input" placeholder="Inserisci il tuo nome">
            <button id="submit-name">Salva punteggio</button>
        </div>
    </div>

    <footer>Ripamonti Daniele 4Ai</footer>

    <script type="module" src="main.js"></script>
    <script type="module" src="classifica.js"></script>
</body>
</html>
