<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gioco del 15</title>
    <link rel="stylesheet" href="stili.css">
</head>
<body>
    <h1>Gioco del 15</h1>
    <div class="wrapper">
        <div id="game-board"></div>

        <aside class="controls">
            <div id="moves">Mosse: 0</div>
            <button id="reset-btn">Gioca ancora</button>
        </aside>
    </div>

    <!-- Popup personalizzato -->
    <div id="victory-popup" class="popup">
        <div class="popup-content">
            <h2>Hai vinto!</h2>
            <p id="victory-message"></p>
            <input type="text" id="name-input" placeholder="Inserisci il tuo nome">
            <button id="submit-name">Invia</button>
        </div>
    </div>

    <script src="script.js"></script> 
</body>
</html>
